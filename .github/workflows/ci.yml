# Runs the shared quality gates and the real web happy-path E2E so regressions fail before merge.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install agent dependencies
        run: npm --prefix agent ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run frontend unit tests
        run: npm run test

      - name: Typecheck agent
        run: npm run typecheck:agent

      - name: Run agent tests
        run: npm run test:agent

  web-e2e:
    runs-on: ubuntu-latest
    needs: quality
    # Pre-existing fixture/runtime flakiness in the heavy Metro + Playwright e2e
    # (the workspace/e2e-existing-project setup is missing at test time). Keep it
    # running for visibility, but do not let it block main — the deterministic
    # `quality` job is the merge gate. Remove this once the e2e fixture setup is
    # made reliable.
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install agent dependencies
        run: npm --prefix agent ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run web happy-path E2E
        run: npm run test:e2e:web

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
